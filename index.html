<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 18th Birthday Simran ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
text-align:center;
}

#lockScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
}

input{
padding:12px;
width:250px;
border:none;
border-radius:10px;
margin-top:15px;
text-align:center;
}

button{
padding:12px 25px;
margin-top:15px;
border:none;
border-radius:25px;
background:red;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
box-shadow:0 0 20px red;
}

#main{
display:none;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000,#140000,#000);
}

.hero h1{
font-size:3rem;
color:#ff1a1a;
text-shadow:0 0 25px red;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px red; }
to{ text-shadow:0 0 35px red; }
}

.section{
padding:70px 20px;
}

#countdown{
font-size:28px;
margin-top:20px;
color:#ff4d4d;
}

.message{
max-width:800px;
margin:auto;
line-height:2;
font-size:20px;
color:#ddd;
}

.slider{
width:90%;
max-width:350px;
margin:auto;
}

.slider img{
width:100%;
height:450px;
object-fit:cover;
border-radius:20px;
border:2px solid red;
box-shadow:0 0 25px red;
}

.heart{
position:fixed;
bottom:-20px;
font-size:30px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

.final{
font-size:28px;
color:#ff4d4d;
margin-top:30px;
}

footer{
padding:40px;
color:#ff4d4d;
}
</style>
</head>
<body>

<div id="lockScreen">
<h1>🔐 Birthday Surprise</h1>
<p>Enter Password</p>
<input type="password" id="pass" placeholder="Password">
<button onclick="unlock()">Open Surprise ❤️</button>
</div>

<div id="main">

<section class="hero">
<h1>Happy 18th Birthday Simran ❤️</h1>
<h2 id="countdown"></h2>
<br>
<button onclick="startParty()">Celebrate 🎉</button>
</section>

<section class="section">
<h1>💌 Special Message</h1>
<br><br>
<div id="typing" class="message"></div>
</section>

<section class="section">
<h1>📸 Our Memories</h1>
<br><br>
<div class="slider">
<!-- Paila dekhine photo ko naam mathi upload gareko screenshot ko naam rakhidiye ko chha -->
<img id="slide" src="Screenshot_2026-06-24-08-25-30-436_com.instagram.android.jpg">
</div>
</section>

<section class="section">
<h1>🎁 Final Surprise</h1>
<br>
<button onclick="finalMessage()">Click Me ❤️</button>
<p class="final" id="finalText"></p>
</section>

<footer>
Made With ❤️ For Simran
</footer>

</div>

<script>
function unlock(){
let p=document.getElementById("pass").value;
if(p==="Simran18"){
document.getElementById("lockScreen").style.display="none";
document.getElementById("main").style.display="block";
launchConfetti();
typeWriter();
}
else{
alert("Wrong Password ❌");
}
}

function launchConfetti(){
confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});
}

function startParty(){
confetti({
particleCount:300,
spread:180
});
}

let text="Happy 18th Birthday Simran ❤️. You are not just my bestie, you are one of the most special people in my life. Thank you for every smile, every memory, and every moment we shared together. May your life be filled with happiness, success, love, and endless beautiful memories. Keep smiling and shining forever. Happy Birthday Bestie 🎂✨❤️";
let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

// Fixed Image Names here
let images=[
"IMG_20260428_144201.jpg",
"Screenshot_2026-06-24-08-25-30-436_com.instagram.android.jpg",
"Screenshot_2026-06-24-08-25-15-203_com.instagram.android.jpg"
];

let index=0;
setInterval(()=>{
index++;
if(index>=images.length){
index=0;
}
document.getElementById("slide").src=images[index];
},2500);

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML=Math.random()>0.5?"❤️":"🌹";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(heart);
setTimeout(()=>{
heart.remove();
},6000);
}
setInterval(createHeart,250);

function finalMessage(){
document.getElementById("finalText").innerHTML="✨ Simran, you will always be one of my favorite people. Happy 18th Birthday Bestie ❤️🎂✨";
confetti({
particleCount:500,
spread:180
});
}

let birthday=new Date("June 25, 2026 00:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let gap=birthday-now;
let days=Math.floor(gap/(1000*60*60*24));
let hours=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
let mins=Math.floor((gap%(1000*60*60))/(1000*60));
let secs=Math.floor((gap%(1000*60))/1000);
document.getElementById("countdown").innerHTML=days+" Days "+hours+" Hours "+mins+" Min "+secs+" Sec";
},1000);
</script>

</body>
  </html>
